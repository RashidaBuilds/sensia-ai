<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Sensia AI</title>

  <!-- NEW PREMIUM FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="app">

    <div class="background"></div>

    <!-- HERO -->
    <div class="assistant">
      <h1 class="title">Tell me what you remember</h1>

      <p class="subtitle" id="assistantMessage">
        I can figure out the place even if you do not know the name
      </p>

      <p class="hint">
        Describe landmarks, vibe or anything you remember seeing
      </p>
    </div>

    <!-- ORB -->
    <div class="orb" id="orb">

      <div class="orb-core"></div>

      <div class="orb-ring ring1"></div>
      <div class="orb-ring ring2"></div>

      <!-- MAP GRID -->
      <div class="orb-grid"></div>

      <!-- LATITUDE LINES -->
      <div class="orb-lat lat1"></div>
      <div class="orb-lat lat2"></div>

      <div class="orb-particles">
        <span></span><span></span><span></span><span></span>
      </div>

    </div>

    <!-- SUGGESTIONS -->
    <div class="chips">
      <div class="chip">Find a place for a picnic</div>
      <div class="chip">A calm place to walk</div>
      <div class="chip">A green place for photos</div>
    </div>

    <!-- INPUT -->
    <div class="input-area">

      <button class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 15a3 3 0 003-3V5a3 3 0 10-6 0v7a3 3 0 003 3z" stroke="white" stroke-width="1.5"/>
          <path d="M19 11a7 7 0 01-14 0M12 18v3M8 21h8" stroke="white" stroke-width="1.5"/>
        </svg>
      </button>

      <input 
        id="userInput"
        placeholder="Describe a place the way you remember it"
      />

      <button class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="14" rx="2" stroke="white" stroke-width="1.5"/>
          <circle cx="8" cy="10" r="2" stroke="white" stroke-width="1.5"/>
          <path d="M21 15l-5-5-6 6" stroke="white" stroke-width="1.5"/>
        </svg>
      </button>

      <button id="sendBtn">➤</button>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
